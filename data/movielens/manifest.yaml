# MovieLens manifest — User × Movie via ratings junction
#
# The rating metric lives on the Rating junction (relationship metric).
# The table grain is User × Movie, which matches the junction's
# natural grain — no propagation needed. This exercises:
#   - relationship metrics at natural grain
#   - non-additive metric (rating) with sum_over_sum weight

entities:
  - name: User
    role: leaf
    detail: false
    estimated_rows: 610
    id_column: userId
    metrics: []

  - name: Movie
    role: leaf
    detail: true
    estimated_rows: 9724
    id_column: movieId
    label_column: title
    source_table: movies
    metrics: []

relationships:
  - name: Rating
    between: [User, Movie]
    type: many-to-many
    estimated_links: 100836
    weight_column: rating
    source_table: ratings
    columns:
      User: userId
      Movie: movieId
    metrics:
      - name: rating
        type: score
        nature: non-additive

propagations: []

bft_tables:
  - name: user_movie
    entities: [User, Movie]
    metrics: [rating]
